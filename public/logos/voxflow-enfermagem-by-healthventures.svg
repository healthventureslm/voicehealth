<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" font-family="Inter, -apple-system, system-ui, sans-serif">
  <!-- ============================================================
       VoxFlow Enfermagem · by HealthVentures
       Lockup principal — para light mode (fundo claro)
       Cores provisórias (confirmar com Marco):
         - Ciano produto: #06B6D4
         - Gradiente HV: #10E5B5 → #06B6D4 → #3B82F6 → #8B5CF6
       ============================================================ -->

  <defs>
    <!-- Gradiente da marca-mãe HealthVentures -->
    <linearGradient id="hvGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#10E5B5"/>
      <stop offset="35%"  stop-color="#06B6D4"/>
      <stop offset="65%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Símbolo: quadrado ciano com ícone de waveform -->
  <rect x="0" y="0" width="72" height="72" rx="14" fill="#06B6D4"/>
  <g stroke="white" stroke-width="5" stroke-linecap="round">
    <line x1="22" y1="30" x2="22" y2="42"/>
    <line x1="32" y1="22" x2="32" y2="50"/>
    <line x1="42" y1="14" x2="42" y2="58"/>
    <line x1="52" y1="22" x2="52" y2="50"/>
  </g>

  <!-- Wordmark do produto -->
  <text x="86" y="34" font-size="26" font-weight="800" letter-spacing="-0.5" fill="#0F172A">VoxFlow</text>
  <text x="86" y="55" font-size="14" font-weight="500" letter-spacing="-0.2" fill="#475569">Enfermagem</text>

  <!-- Sublogo "by HealthVentures" -->
  <g transform="translate(86, 95)">
    <text x="0" y="0" font-size="9" font-weight="500" fill="#94A3B8">by </text>
    <text x="14" y="0" font-size="11" font-weight="800" letter-spacing="-0.2" fill="#0F172A">Health</text>
    <text x="50" y="0" font-size="11" font-weight="800" letter-spacing="-0.2" fill="url(#hvGradient)">Ventures</text>
  </g>
</svg>
