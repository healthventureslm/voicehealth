<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" font-family="Inter, -apple-system, system-ui, sans-serif">
  <!-- VoxFlow Enfermagem — sem sublogo HV. Pra contextos onde o vínculo já está claro. -->

  <!-- Símbolo: quadrado ciano com ícone de waveform -->
  <rect x="0" y="4" width="72" height="72" rx="14" fill="#06B6D4"/>
  <g stroke="white" stroke-width="5" stroke-linecap="round">
    <line x1="22" y1="34" x2="22" y2="46"/>
    <line x1="32" y1="26" x2="32" y2="54"/>
    <line x1="42" y1="18" x2="42" y2="62"/>
    <line x1="52" y1="26" x2="52" y2="54"/>
  </g>

  <!-- Wordmark -->
  <text x="86" y="38" font-size="28" font-weight="800" letter-spacing="-0.6" fill="#0F172A">VoxFlow</text>
  <text x="86" y="60" font-size="15" font-weight="500" letter-spacing="-0.2" fill="#475569">Enfermagem</text>
</svg>
